<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visitor Entry System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a73e8;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { font-size: 13px; opacity: 0.85; }

    /* ── Tab Nav ── */
    .tabs {
      display: flex;
      background: white;
      border-bottom: 2px solid #e0e0e0;
      padding: 0 24px;
    }
    .tab-btn {
      padding: 14px 20px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; }

    /* ── Main Layout ── */
    .page { display: none; padding: 24px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #333; }

    /* ── Camera Box ── */
    .camera-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto 16px;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
    }
    #video { width: 100%; display: block; border-radius: 10px; }
    #canvas { display: none; }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-frame {
      width: 200px; height: 200px;
      border: 2px solid rgba(26,115,232,0.7);
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.3);
    }
    .scan-bar {
      position: absolute;
      width: 196px;
      height: 2px;
      background: #1a73e8;
      animation: scanAnim 2s linear infinite;
      border-radius: 2px;
    }
    @keyframes scanAnim { 0%{top:calc(50% - 99px)} 50%{top:calc(50% + 99px)} 100%{top:calc(50% - 99px)} }

    /* ── Buttons ── */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #d0d0d0;
      background: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #1a73e8; color: white; border-color: #1a73e8; }
    .btn-primary:hover { background: #1558b0; }
    .btn-danger { background: #e53935; color: white; border-color: #e53935; }
    .btn-danger:hover { background: #b71c1c; }
    .btn-green { background: #2e7d32; color: white; border-color: #2e7d32; }
    .btn-green:hover { background: #1b5e20; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 5px; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      transition: border 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: #1a73e8; }

    /* ── Status Box ── */
    .status-box {
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 16px;
      text-align: center;
      display: none;
    }
    .status-box.show { display: block; }
    .status-box.success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
    .status-box.info    { background: #e3f2fd; border: 1px solid #90caf9; color: #1565c0; }
    .status-box.error   { background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; }
    .status-box .big    { font-size: 32px; margin-bottom: 6px; }
    .status-box .title  { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .status-box .sub    { font-size: 13px; opacity: 0.85; }

    /* ── Visitor Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left; padding: 10px 14px;
      background: #f8f9fa; font-weight: 600;
      font-size: 12px; color: #555; text-transform: uppercase;
      border-bottom: 1px solid #e0e0e0;
    }
    td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .badge-blue   { background: #e3f2fd; color: #1565c0; }
    .badge-green  { background: #e8f5e9; color: #2e7d32; }
    .badge-orange { background: #fff3e0; color: #e65100; }

    .loading {
      text-align: center; padding: 20px;
      font-size: 14px; color: #888;
    }

    #visitor-photo {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; border: 3px solid #1a73e8;
      margin: 0 auto 10px; display: block;
    }
  </style>
</head>
<body>

<header>
  <h1>&#128274; Visitor Entry System</h1>
  <span id="clock"></span>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('scan')">&#128247; Scan &amp; Entry</button>
  <button class="tab-btn" onclick="switchTab('register')">&#128221; Register</button>
  <button class="tab-btn" onclick="switchTab('visitors')">&#128101; All Visitors</button>
</div>

<!-- ═══════════════ TAB 1: SCAN ═══════════════ -->
<div class="page active" id="tab-scan">

  <div class="card">
    <h2>Face Scanner</h2>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-bar"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="scanFace()">&#128269; Scan Face</button>
      <button class="btn" onclick="resetScan()">&#8635; Reset</button>
    </div>
  </div>

  <!-- Result shown here -->
  <div id="scan-result"></div>

</div>

<!-- ═══════════════ TAB 2: REGISTER ═══════════════ -->
<div class="page" id="tab-register">

  <div class="card">
    <h2>Register New Visitor</h2>
    <p style="font-size:13px;color:#777;margin-bottom:16px;">
      Use this tab when a visitor has no face data yet. Their face will be captured along with their details.
    </p>

    <div class="camera-wrap">
      <video id="reg-video" autoplay playsinline></video>
      <canvas id="reg-canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-bar"></div>
      </div>
    </div>

    <div class="btn-row" style="margin-bottom:16px;">
      <button class="btn btn-primary" onclick="captureForRegister()">&#128247; Capture Face</button>
      <button class="btn" onclick="clearCapture()">&#8635; Retake</button>
    </div>

    <div id="capture-status" class="status-box info" style="display:none;">
      <div class="title">&#10003; Face Captured</div>
      <div class="sub">Now fill in the details below and click Register.</div>
    </div>

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="r-name" placeholder="e.g. Ravi Patel" />
    </div>
    <div class="form-group">
      <label>Mobile Number *</label>
      <input type="tel" id="r-mobile" placeholder="e.g. 9876543210" />
    </div>
    <div class="form-group">
      <label>Whom to Meet / Flat No.</label>
      <input type="text" id="r-host" placeholder="e.g. Flat 4B / Prof. Sharma" />
    </div>
    <div class="form-group">
      <label>Purpose of Visit</label>
      <select id="r-purpose">
        <option>Delivery</option>
        <option>Meeting / Interview</option>
        <option>Guest / Friend</option>
        <option>Service / Repair</option>
        <option>Vendor</option>
        <option>Other</option>
      </select>
    </div>

    <button class="btn btn-green" style="width:100%;margin-top:8px;" onclick="registerVisitor()">
      &#10003; Register Visitor
    </button>

    <div id="reg-result" style="margin-top:16px;"></div>
  </div>
</div>

<!-- ═══════════════ TAB 3: ALL VISITORS ═══════════════ -->
<div class="page" id="tab-visitors">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin:0">Registered Visitors</h2>
      <button class="btn btn-primary" onclick="loadVisitors()">&#8635; Refresh</button>
    </div>
    <div id="visitors-table"><div class="loading">Loading...</div></div>
  </div>
</div>


<script>
// ─── Clock ─────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('en-IN');
}
setInterval(updateClock, 1000);
updateClock();

// ─── Tab Switching ──────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'visitors') loadVisitors();
}

// ─── Camera Setup ───────────────────────────────────────────────────────────
async function startCamera(videoEl) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    videoEl.srcObject = stream;
  } catch (e) {
    alert('Camera access denied. Please allow camera permission.');
  }
}

const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const regVideo = document.getElementById('reg-video');
const regCanvas = document.getElementById('reg-canvas');

startCamera(video);
startCamera(regVideo);

function captureFrame(videoEl, canvasEl) {
  canvasEl.width  = videoEl.videoWidth;
  canvasEl.height = videoEl.videoHeight;
  canvasEl.getContext('2d').drawImage(videoEl, 0, 0);
  return canvasEl.toDataURL('image/jpeg', 0.85);
}

// ─── State for registration ─────────────────────────────────────────────────
let capturedImage    = null;
let capturedEmbedding = null;

// ─── SCAN & IDENTIFY ────────────────────────────────────────────────────────
async function scanFace() {
  const resultDiv = document.getElementById('scan-result');
  resultDiv.innerHTML = '<div class="card"><div class="loading">&#128269; Scanning face, please wait...</div></div>';

  const imageData = captureFrame(video, canvas);

  try {
    const res  = await fetch('/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageData })
    });
    const data = await res.json();

    if (data.status === 'known') {
      resultDiv.innerHTML = `
        <div class="card">
          <div class="status-box success show">
            <div class="big">&#10003;</div>
            <div class="title">Welcome back, ${data.name}!</div>
            <div class="sub">Recognized automatically — no entry form needed</div>
          </div>
          <table>
            <tr><td style="color:#888;width:140px">Mobile</td><td>${data.mobile}</td></tr>
            <tr><td style="color:#888">Host / Flat</td><td>${data.host || '—'}</td></tr>
            <tr><td style="color:#888">Purpose</td><td>${data.purpose}</td></tr>
            <tr><td style="color:#888">Total Visits</td><td>${data.total_visits}</td></tr>
            <tr><td style="color:#888">Last Visit</td><td>${data.last_visit}</td></tr>
            <tr><td style="color:#888">Match Score</td><td>${(data.score * 100).toFixed(1)}%</td></tr>
          </table>
          <div class="btn-row" style="margin-top:16px;">
            <button class="btn btn-green" onclick="resetScan()">&#10003; Grant Entry</button>
            <button class="btn btn-danger" onclick="resetScan()">&#10007; Deny Entry</button>
          </div>
        </div>`;
    } else if (data.status === 'unknown') {
      // Store embedding to avoid re-processing during registration
      capturedEmbedding = data.embedding;
      capturedImage     = imageData;
      resultDiv.innerHTML = `
        <div class="card">
          <div class="status-box info show">
            <div class="big">&#128100;</div>
            <div class="title">New Visitor Detected</div>
            <div class="sub">Face not found in database. Please fill in the form below.</div>
          </div>
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="q-name" placeholder="e.g. Ravi Patel" />
          </div>
          <div class="form-group">
            <label>Mobile Number *</label>
            <input type="tel" id="q-mobile" placeholder="e.g. 9876543210" />
          </div>
          <div class="form-group">
            <label>Whom to Meet / Flat No.</label>
            <input type="text" id="q-host" placeholder="e.g. Flat 4B / Prof. Sharma" />
          </div>
          <div class="form-group">
            <label>Purpose of Visit</label>
            <select id="q-purpose">
              <option>Delivery</option>
              <option>Meeting / Interview</option>
              <option>Guest / Friend</option>
              <option>Service / Repair</option>
              <option>Vendor</option>
              <option>Other</option>
            </select>
          </div>
          <button class="btn btn-green" style="width:100%" onclick="quickRegister()">
            &#10003; Register &amp; Grant Entry
          </button>
        </div>`;
    } else {
      resultDiv.innerHTML = `
        <div class="card">
          <div class="status-box error show">
            <div class="big">&#9888;</div>
            <div class="title">No Face Detected</div>
            <div class="sub">${data.message || 'Please look directly at the camera and try again.'}</div>
          </div>
        </div>`;
    }
  } catch (e) {
    resultDiv.innerHTML = `<div class="card"><div class="status-box error show"><div class="title">Server error</div><div class="sub">${e.message}</div></div></div>`;
  }
}

// Quick register straight from scan tab (uses already-computed embedding)
async function quickRegister() {
  const name    = document.getElementById('q-name').value.trim();
  const mobile  = document.getElementById('q-mobile').value.trim();
  const host    = document.getElementById('q-host').value.trim();
  const purpose = document.getElementById('q-purpose').value;

  if (!name || !mobile) { alert('Name and mobile are required.'); return; }

  const res  = await fetch('/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name, mobile, host, purpose,
      image:     capturedImage,
      embedding: capturedEmbedding
    })
  });
  const data = await res.json();
  const rd   = document.getElementById('scan-result');
  if (data.status === 'registered') {
    rd.innerHTML = `
      <div class="card">
        <div class="status-box success show">
          <div class="big">&#10003;</div>
          <div class="title">${data.name} registered &amp; entry granted!</div>
          <div class="sub">Visitor ID: ${data.visitor_id}</div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="resetScan()">
          Next Visitor
        </button>
      </div>`;
  }
}

function resetScan() {
  document.getElementById('scan-result').innerHTML = '';
  capturedImage     = null;
  capturedEmbedding = null;
}

// ─── REGISTER TAB ───────────────────────────────────────────────────────────
let regImage    = null;
let regEmbedding = null;

function captureForRegister() {
  regImage = captureFrame(regVideo, regCanvas);
  document.getElementById('capture-status').style.display = 'block';
  // Pre-scan to get embedding
  fetch('/scan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image: regImage })
  }).then(r => r.json()).then(data => {
    if (data.status === 'unknown') {
      regEmbedding = data.embedding;
    } else if (data.status === 'known') {
      document.getElementById('capture-status').innerHTML =
        `<div class="title">&#9888; Face Already Registered</div>
         <div class="sub">This person (${data.name}) is already in the database. Go to Scan tab to identify them.</div>`;
      document.getElementById('capture-status').className = 'status-box error show';
    }
  });
}

function clearCapture() {
  regImage     = null;
  regEmbedding = null;
  document.getElementById('capture-status').style.display = 'none';
}

async function registerVisitor() {
  if (!regImage || !regEmbedding) {
    alert('Please capture the visitor\'s face first.');
    return;
  }
  const name    = document.getElementById('r-name').value.trim();
  const mobile  = document.getElementById('r-mobile').value.trim();
  const host    = document.getElementById('r-host').value.trim();
  const purpose = document.getElementById('r-purpose').value;

  if (!name || !mobile) { alert('Name and mobile are required.'); return; }

  const res  = await fetch('/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mobile, host, purpose, image: regImage, embedding: regEmbedding })
  });
  const data = await res.json();
  const rd   = document.getElementById('reg-result');

  if (data.status === 'registered') {
    rd.innerHTML = `<div class="status-box success show">
      <div class="big">&#10003;</div>
      <div class="title">${data.name} registered successfully!</div>
      <div class="sub">Visitor ID: ${data.visitor_id}. They will be auto-recognized next time.</div>
    </div>`;
    // Clear form
    ['r-name','r-mobile','r-host'].forEach(id => document.getElementById(id).value = '');
    clearCapture();
  }
}

// ─── VISITORS TABLE ──────────────────────────────────────────────────────────
async function loadVisitors() {
  const container = document.getElementById('visitors-table');
  container.innerHTML = '<div class="loading">Loading...</div>';
  const res  = await fetch('/visitors');
  const data = await res.json();

  if (!data.length) {
    container.innerHTML = '<div class="loading">No visitors registered yet.</div>';
    return;
  }

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Mobile</th><th>Host / Flat</th><th>Purpose</th>
          <th>Visits</th><th>Last Visit</th><th>Action</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(v => `
          <tr>
            <td><strong>${v.name}</strong></td>
            <td>${v.mobile}</td>
            <td>${v.host || '—'}</td>
            <td><span class="badge badge-blue">${v.purpose}</span></td>
            <td><span class="badge badge-green">${v.total_visits}</span></td>
            <td style="font-size:12px;color:#888">${v.last_visit}</td>
            <td>
              <button class="btn btn-danger" style="padding:5px 12px;font-size:12px"
                onclick="deleteVisitor('${v.id}', '${v.name}')">Remove</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

async function deleteVisitor(id, name) {
  if (!confirm(`Remove ${name} from the database?`)) return;
  await fetch('/delete/' + id, { method: 'DELETE' });
  loadVisitors();
}
</script>

</body>
</html>
